syntax = "proto3";
package helix;

// ── Service ──────────────────────────────────────────────────────────────────

service Helix {
  // Streaming text completion
  rpc Complete (CompleteRequest) returns (stream Token);

  // Non-streaming chat (returns full response)
  rpc Chat (ChatRequest) returns (ChatResponse);

  // Get embedding vector for input text
  rpc Embed (EmbedRequest) returns (EmbedResponse);

  // Health check
  rpc Health (Empty) returns (HealthResponse);

  // List loaded models
  rpc ListModels (Empty) returns (ModelsResponse);
}

// ── Messages ─────────────────────────────────────────────────────────────────

message Empty {}

message CompleteRequest {
  string session_id     = 1;  // reuse KV-cache across calls
  string prompt         = 2;
  uint32 max_new_tokens = 3;
  SamplerConfig sampler = 4;
}

message ChatRequest {
  string session_id     = 1;
  repeated Message messages = 2;
  uint32 max_new_tokens = 3;
  SamplerConfig sampler = 4;
}

message Message {
  string role    = 1;   // "system" | "user" | "assistant"
  string content = 2;
}

message ChatResponse {
  string content     = 1;
  uint32 input_tokens  = 2;
  uint32 output_tokens = 3;
  double generation_ms = 4;
}

message Token {
  uint32 id      = 1;
  string text    = 2;
  double logprob = 3;
  uint64 gen_time_us = 4;
}

message EmbedRequest {
  string text = 1;
  string pool = 2;  // "mean" | "last" | "first"
}

message EmbedResponse {
  repeated float embedding = 1;
  uint32 dim = 2;
}

message SamplerConfig {
  float  temperature        = 1;
  float  top_p              = 2;
  uint32 top_k              = 3;
  float  min_p              = 4;
  float  repetition_penalty = 5;
  uint32 seed               = 6;
}

message HealthResponse {
  bool   ok           = 1;
  string model        = 2;
  uint64 uptime_secs  = 3;
  uint64 requests_served = 4;
}

message ModelsResponse {
  repeated ModelInfo models = 1;
}

message ModelInfo {
  string name        = 1;
  string format      = 2;
  uint64 params      = 3;
  uint32 context_len = 4;
}
